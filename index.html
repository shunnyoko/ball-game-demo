<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>シーソー×玉乗り（スマホ最適化）</title>

<style>
body {
  margin:0;
  background:#222;
  overflow:hidden;
}

#game {
  display:block;
  margin:auto;
  background:#eee;
}

/* ===== ボタン ===== */
.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display:flex;
  justify-content: space-between;
  padding: 0 30px;
  box-sizing: border-box;
}

.btn {
  width: 22vw;
  height: 22vw;
  max-width: 90px;
  max-height: 90px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 28px;
  color:white;
}

#gyroBtn {
  position: fixed;
  top: 10px;
  left: 10px;
  padding: 8px 12px;
  background:white;
  border-radius:6px;
  font-size:14px;
}
</style>
</head>

<body>

<button id="gyroBtn">ジャイロ開始</button>
<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="leftBtn">◀</div>
  <div class="btn" id="rightBtn">▶</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 内部解像度（固定）=====
const BASE_W = 800;
const BASE_H = 400;

// ===== リサイズ =====
function resize(){
  let scale = window.innerWidth / BASE_W;
  canvas.width = BASE_W;
  canvas.height = BASE_H;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = (BASE_H * scale) + "px";
}
window.addEventListener("resize", resize);
resize();

// ===== 以下はそのまま =====

let input = 0;
let gyroInput = 0;
let useGyro = false;

let baseGamma = 0;
let calibrated = false;

let board = { x:400, y:260, angle:0 };
let ball = { x:400, radius:20, vx:0 };
let rider = { gx:0, gv:0 };
let displayGx = 0;

const LIMIT = ball.radius * 0.8;

// ボタン
function bind(btn, val){
  btn.ontouchstart = () => input = val;
  btn.ontouchend = () => input = 0;
  btn.onmousedown = () => input = val;
  btn.onmouseup = () => input = 0;
}
bind(leftBtn,-1);
bind(rightBtn,1);

// ジャイロ
gyroBtn.onclick = async () => {

  calibrated = false;

  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") return;
  }

  useGyro = true;

  window.addEventListener("deviceorientation", e => {

    let raw = e.gamma;

    if (!calibrated) {
      baseGamma = raw;
      calibrated = true;
    }

    let diff = raw - baseGamma;

    if (Math.abs(diff) < 3) diff = 0;

    let normalized = diff / 30;

    gyroInput = Math.sign(normalized) * Math.pow(Math.abs(normalized), 1.5);
    gyroInput = Math.max(-1, Math.min(1, gyroInput));
  });
};

// 更新
function update(){

  let finalInput = useGyro ? gyroInput : input;

  let target = finalInput * 0.5;
  board.angle += (target - board.angle) * 0.05;
  board.angle *= 0.98;

  let ax = Math.sin(board.angle) * 0.5;

  ball.vx += ax;
  ball.vx *= 0.99;
  ball.x += ball.vx;

  let dx = ball.x - board.x;
  let dy = Math.tan(board.angle) * dx;
  let ballY = board.y + dy;

  rider.gv += (-ax) * 0.6;
  rider.gv *= 0.92;
  rider.gx += rider.gv;
  rider.gx *= 0.999;

  displayGx += (rider.gx - displayGx) * 0.2;

  ball.x = Math.max(50, Math.min(750, ball.x));

  return ballY;
}

// 描画
function draw(ballY){

  ctx.clearRect(0,0,BASE_W,BASE_H);

  let stress = Math.abs(rider.gx) / LIMIT;

  ctx.save();
  ctx.translate(board.x, board.y);
  ctx.rotate(board.angle);
  ctx.fillStyle = "#444";
  ctx.fillRect(-300,-5,600,10);
  ctx.restore();

  ctx.beginPath();
  ctx.arc(ball.x, ballY, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = "orange";
  ctx.fill();

  let mx = ball.x + displayGx;
  let my = ballY - ball.radius;

  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(displayGx * 0.02);
  ctx.beginPath();
  ctx.arc(0,0,10,0,Math.PI*2);
  ctx.fillStyle = "#333";
  ctx.fill();
  ctx.fillRect(-4,0,8,20);
  ctx.restore();

  let color = stress < 0.4 ? "green" : (stress < 0.7 ? "orange" : "red");
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(ball.x, ballY);
  ctx.lineTo(mx, my);
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.font = "14px monospace";
  ctx.fillText(`angle ${(board.angle*180/Math.PI).toFixed(1)}`,10,360);
  ctx.fillText(`speed ${ball.vx.toFixed(2)}`,10,380);
}

// ループ
function loop(){
  let y = update();
  draw(y);
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
