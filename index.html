<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>シーソー×玉乗り（縦最適化）</title>

<style>
body {
  margin:0;
  background:#222;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#game {
  background:#eee;
}

/* ボタン */
.controls {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display:flex;
  justify-content: space-between;
  padding: 0 40px;
}

.btn {
  width: 80px;
  height: 80px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:white;
}

#gyroBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px;
  background:white;
  border-radius:6px;
}
</style>
</head>

<body>

<button id="gyroBtn">ジャイロ開始</button>
<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="leftBtn">◀</div>
  <div class="btn" id="rightBtn">▶</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 縦向けサイズ =====
const BASE_W = 400;
const BASE_H = 700;

// ===== リサイズ =====
function resize(){
  let scale = window.innerHeight / BASE_H;

  canvas.width = BASE_W;
  canvas.height = BASE_H;

  canvas.style.width = BASE_W * scale + "px";
  canvas.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", resize);
resize();

// ===== 状態 =====
let input = 0;
let gyroInput = 0;
let useGyro = false;

let baseGamma = 0;
let calibrated = false;

// ===== シーソー位置（上寄せ）=====
let board = { x:200, y:300, angle:0 };

// ===== ボール =====
let ball = { x:200, radius:25, vx:0 };

// ===== 重心 =====
let rider = { gx:0, gv:0 };
let displayGx = 0;

const LIMIT = ball.radius * 0.8;

// ===== 操作 =====
function bind(btn, val){
  btn.ontouchstart = () => input = val;
  btn.ontouchend = () => input = 0;
}
bind(leftBtn,-1);
bind(rightBtn,1);

// ===== ジャイロ =====
gyroBtn.onclick = async () => {

  calibrated = false;

  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") return;
  }

  useGyro = true;

  window.addEventListener("deviceorientation", e => {

    let raw = e.gamma;

    if (!calibrated) {
      baseGamma = raw;
      calibrated = true;
    }

    let diff = raw - baseGamma;

    if (Math.abs(diff) < 3) diff = 0;

    let normalized = diff / 30;

    gyroInput = Math.sign(normalized) * Math.pow(Math.abs(normalized), 1.5);
    gyroInput = Math.max(-1, Math.min(1, gyroInput));
  });
};

// ===== 更新 =====
function update(){

  let finalInput = useGyro ? gyroInput : input;

  let target = finalInput * 0.5;
  board.angle += (target - board.angle) * 0.05;
  board.angle *= 0.98;

  let ax = Math.sin(board.angle) * 0.6;

  ball.vx += ax;
  ball.vx *= 0.99;
  ball.x += ball.vx;

  let dx = ball.x - board.x;
  let dy = Math.tan(board.angle) * dx;
  let ballY = board.y + dy;

  rider.gv += (-ax) * 0.7;
  rider.gv *= 0.9;
  rider.gx += rider.gv;
  rider.gx *= 0.995;

  displayGx += (rider.gx - displayGx) * 0.2;

  ball.x = Math.max(60, Math.min(340, ball.x));

  return ballY;
}

// ===== 描画 =====
function draw(ballY){

  ctx.clearRect(0,0,BASE_W,BASE_H);

  let stress = Math.abs(rider.gx) / LIMIT;

  // シーソー
  ctx.save();
  ctx.translate(board.x, board.y);
  ctx.rotate(board.angle);
  ctx.fillStyle = "#444";
  ctx.fillRect(-150,-5,300,10);
  ctx.restore();

  // ボール
  ctx.beginPath();
  ctx.arc(ball.x, ballY, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = "orange";
  ctx.fill();

  // 人
  let mx = ball.x + displayGx;
  let my = ballY - ball.radius;

  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(displayGx * 0.02);

  ctx.beginPath();
  ctx.arc(0,0,12,0,Math.PI*2);
  ctx.fillStyle = "#333";
  ctx.fill();

  ctx.fillRect(-5,0,10,25);
  ctx.restore();

  // HUD（下中央に）
  ctx.fillStyle = "black";
  ctx.font = "16px monospace";
  ctx.textAlign = "center";

  ctx.fillText(`angle ${(board.angle*180/Math.PI).toFixed(1)}`,200,620);
  ctx.fillText(`speed ${ball.vx.toFixed(2)}`,200,645);
  ctx.fillText(`tilt ${gyroInput.toFixed(2)}`,200,670);
}

// ===== ループ =====
function loop(){
  let y = update();
  draw(y);
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
